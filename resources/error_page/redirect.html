<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>跳转 | {{ .Title }}</title>
    <link rel="stylesheet" type="text/css" href="https://{{ .StaticDomain }}/css/icp.css">
    <link rel="stylesheet" type="text/css" href="https://{{ .StaticDomain }}/css/style.css">
</head>
<body class="body">
<div class="top-tabs">
    <a href="https://{{ .WWWDomain }}/" class="top-tab">主页</a>
    <a href="javascript:alert('这里正在维护')" class="top-tab">文件</a>
    <a href="https://{{ .WWWDomain }}/contact" class="top-tab">联系</a>
</div>

<div class="card center">
    <h1 class="h1-in-card">您即将离开本站</h1>
    <p class="p-in-card">您即将前往 {{ .TargetURL }}</p>
    <p class="p-in-card">新的网站不受本站约束，继续访问时可能存在不可控的风险</p>
    <p class="p-in-card">诈骗无情，防范有道，智慧防范，安全无忧。 </p>
    <p class="p-in-card">如果继续，本站将不承担您在目标网站的任何责任，如果继续访问，请点击<a href="{{ .TargetURL }}">这里</a></p>
</div>
<div class="beian-container">
    <div class="beian-inner-container">
        <a class="beian-icp-link" target="_blank" href="https://beian.miit.gov.cn">{{ .ICPNumber }}</a>
        <a class="beian-nismsp-link" target="_blank" href="https://beian.mps.gov.cn/#/query/webSearch">
            <img class="beian-nismsp-ico" src="https://{{ .StaticDomain }}/ico/nismsp.png" alt="nismsp.png"/>
            {{ .NISMSPNumber }}
        </a>
    </div>
</div>
</body>
</html>
